config.suffixes.add(".py")

# `utils.py` is a helper module imported by the tests, not a test itself.
config.excludes.add("utils.py")

# d2m-jit tests share a physical device and must run serially.
config.parallelism_group = "d2m-jit"

if not config.enable_bindings_python:
    config.unsupported = True
