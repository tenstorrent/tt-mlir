import os

config.suffixes.add(".py")

# ttnn-jit tests access hardware devices and must run serially
config.parallelism_group = "ttnn-jit"

if not config.enable_ttnn_jit:
    config.unsupported = True

config.environment["PYTHONPATH"] = os.pathsep.join(
    [
        os.path.join(config.test_source_root, "ttnn-jit"),
        config.environment.get("PYTHONPATH", ""),
    ]
)
