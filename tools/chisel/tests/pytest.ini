[pytest]
markers =
    no_device: test runs without TT hardware; only needs compiled Python packages and torch
    llvm_lit: test uses _ttmlir_runtime C++ extension built by the LLVM/cmake pipeline
    builder: test uses the Python builder (compile_and_execute_ttnn / execute_fb) to compile ops on-device
