[project]
name = "mlir-graph-telemetry"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "kuzu>=0.11",
    "httpx>=0.27",
    "pandas>=2.0",
]

[project.scripts]
mlir-graph-serve = "graph_telemetry.serve.__main__:main"
mlir-graph-push = "graph_telemetry.push.__main__:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["graph_telemetry*"]

[tool.setuptools.package-data]
"graph_telemetry.serve" = ["static/*"]
