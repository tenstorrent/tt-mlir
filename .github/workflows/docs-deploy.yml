name: Docs - Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      SEARCH_API_BASE: https://csl860x2oj.execute-api.us-east-2.amazonaws.com/prod
      DOC_CATALOG_SOURCE_ID: docs-tenstorrent
      DOC_SITE_BASE_URL: https://docs.tenstorrent.com/tt-mlir
      DOCS_ID_NAMESPACE: tt-mlir
      DOCS_INDEX_VERSION: latest
      DOCS_OUTPUT_DIR: docs/build/html
      DOCS_SEARCH_INGEST_API_KEY: ${{ secrets.DOCS_SEARCH_INGEST_API_KEY_DOCS_TENSTORRENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build docs
        run: |
          mkdir -p docs/build/html
          sphinx-build docs/src docs/build/html
          touch docs/build/html/.nojekyll

      - name: Warn if remote search ingest key is missing
        if: ${{ env.DOCS_SEARCH_INGEST_API_KEY == '' }}
        run: echo "::warning::Skipping OpenSearch indexing because DOCS_SEARCH_INGEST_API_KEY is not set."

      - name: Index docs into OpenSearch
        if: ${{ env.DOCS_SEARCH_INGEST_API_KEY != '' }}
        run: python scripts/index_remote_search.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
