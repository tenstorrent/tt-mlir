# Draft only, testing tracy in CI
name: Update Test Durations

on:
  workflow_dispatch:
    inputs:
      metal_override:
        description: 'Git SHA of commit in tenstorrent/tt-metal (optional)'
        required: false
        type: string
  # schedule:
  #   - cron: '0 7 * * 1'

permissions:
  checks: write
  packages: write
  pull-requests: write
  contents: write
  actions: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    uses: ./.github/workflows/call-build-docker.yml
    secrets: inherit

  prepare-run:
    uses: ./.github/workflows/call-prepare-run.yml
    with:
      builder_build: true
      build_all: true
      min_timeout: 180
    secrets: inherit

  release-build:
    needs: [ prepare-run, build-image ]
    if: needs.prepare-run.outputs.skip_build != 'true'
    uses: ./.github/workflows/call-build-release.yml
    secrets: inherit
    with:
      metal_override: ${{ inputs.metal_override }}
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      runner: ${{ needs.prepare-run.outputs.runner }}
      sh_builder: ${{ fromJson(needs.prepare-run.outputs.sh_builder) }}
      component_matrix: ${{ needs.prepare-run.outputs.build_matrix }}

  test:
    needs: [ prepare-run, build-image, release-build ]
    if: needs.prepare-run.outputs.skip_build != 'true'
    uses: ./.github/workflows/call-test.yml
    secrets: inherit
    with:
      docker_image: ${{ needs.build-image.outputs.docker-image }}
      test_matrix: |
        [
          {
            "runs-on": "llmbox",
            "image": "tracy",
            "tests": [
              {
                "script": "ttnn_runtime.sh",
                "args": "runtime/test/ttnn/python/distributed/llmbox/test_multiprocess_tracy.py"
              }
            ]
          }
        ]
      timeout: 60

