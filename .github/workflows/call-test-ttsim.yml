name: TTSim Golden Tests

on:
  workflow_call:
    inputs:
      docker_image:
        description: "Docker image for the test"
        required: true
        type: string
      build_image_name:
        description: "Release build flavor to reuse artifacts from"
        required: false
        type: string
        default: "speedy"
      ttsim-version:
        description: "TTSim release tag"
        required: false
        type: string
        default: "v1.4.4"
      timeout:
        description: "Timeout in minutes for the TTSim test job"
        required: false
        type: number
        default: 30

permissions:
  checks: write
  packages: write

jobs:
  ttsim-golden:
    name: "TTSim golden (${{ matrix.arch }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: wormhole_b0
            soc_desc: wormhole_b0_80_arch.yaml
            ttsim_asset: libttsim_wh.so
          - arch: blackhole
            soc_desc: blackhole_140_arch.yaml
            ttsim_asset: libttsim_bh.so
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout }}
    container:
      image: ${{ inputs.docker_image }}
    env:
      ARCH_NAME: ${{ matrix.arch }}
      SOC_DESC: ${{ matrix.soc_desc }}
      TT_METAL_SIMULATOR_HOME: ${{ github.workspace }}/sim
      TT_METAL_SIMULATOR: ${{ github.workspace }}/sim/libttsim.so
      TT_METAL_SLOW_DISPATCH_MODE: 1
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set reusable strings
        id: strings
        run: |
          echo "work-dir=$(pwd)" >> "$GITHUB_OUTPUT"
          echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"
          echo "install-output-dir=$(pwd)/install" >> "$GITHUB_OUTPUT"

      - name: Git safe dir
        run: git config --global --add safe.directory ${{ steps.strings.outputs.work-dir }}

      - name: Use install artifacts
        uses: tenstorrent/tt-forge/.github/actions/download-artifact@main
        with:
          name: install-artifacts-${{ inputs.build_image_name }}
          path: install
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ttrt run wheels
        uses: actions/download-artifact@v6
        with:
          name: ttrt-whl-${{ inputs.build_image_name }}

      - name: Install ttrt run wheels
        run: |
          source env/activate
          pip show ttrt > /dev/null 2>&1 && pip uninstall -y ttrt || true
          pip install ttrt*.whl --upgrade

      - name: Download build artifacts
        uses: tenstorrent/tt-forge/.github/actions/download-artifact@main
        with:
          name: build-artifacts-${{ inputs.build_image_name }}
          path: build
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download TTSim binary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download ${{ inputs.ttsim-version }} --pattern "${{ matrix.ttsim_asset }}" -R tenstorrent/ttsim -D /tmp/ttsim

      - name: Install TTSim
        run: |
          set -euo pipefail
          export WORK_DIR="${{ steps.strings.outputs.work-dir }}"
          export INSTALL_DIR="${{ steps.strings.outputs.install-output-dir }}"
          export TT_METAL_HOME="$WORK_DIR/third_party/tt-metal/src/tt-metal"
          mkdir -p "$TT_METAL_SIMULATOR_HOME"
          mv "/tmp/ttsim/${{ matrix.ttsim_asset }}" "$TT_METAL_SIMULATOR_HOME/libttsim.so"

          soc_desc_path=""
          for candidate in \
            "$TT_METAL_HOME/tt_metal/soc_descriptors/$SOC_DESC" \
            "$INSTALL_DIR/tt-metal/tt_metal/soc_descriptors/$SOC_DESC"; do
            if [[ -f "$candidate" ]]; then
              soc_desc_path="$candidate"
              break
            fi
          done

          if [[ -z "$soc_desc_path" ]]; then
            echo "Unable to locate SoC descriptor: $SOC_DESC"
            echo "Searched under TT_METAL_HOME=$TT_METAL_HOME and INSTALL_DIR=$INSTALL_DIR"
            exit 1
          fi

          cp "$soc_desc_path" "$TT_METAL_SIMULATOR_HOME/soc_descriptor.yaml"

      - name: Generate simulator system descriptor
        run: |
          source env/activate
          export LD_LIBRARY_PATH="${{ steps.strings.outputs.install-output-dir }}/lib:${TTMLIR_TOOLCHAIN_DIR}/lib:${LD_LIBRARY_PATH}"
          ttrt query --save-artifacts

      - name: Run golden pytest on TTSim
        run: |
          source env/activate
          export WORK_DIR="${{ steps.strings.outputs.work-dir }}"
          export BUILD_DIR="${{ steps.strings.outputs.build-output-dir }}"
          export INSTALL_DIR="${{ steps.strings.outputs.install-output-dir }}"
          export TT_MLIR_HOME="$WORK_DIR"
          export TT_METAL_RUNTIME_ROOT="$INSTALL_DIR/tt-metal"
          export TT_METAL_HOME="$WORK_DIR/third_party/tt-metal/src/tt-metal"
          export LD_LIBRARY_PATH="$INSTALL_DIR/lib:${TTMLIR_TOOLCHAIN_DIR}/lib:${LD_LIBRARY_PATH}"
          export SYSTEM_DESC_PATH="${GITHUB_WORKSPACE}/ttrt-artifacts/system_desc.ttsys"
          export TT_METAL_INSPECTOR="0"
          export TT_METAL_INSPECTOR_RPC="0"
          mkdir -p test_reports

          run_sim_test() {
            local nodeid="$1"
            local kexpr="$2"
            local report="$3"
            if [[ -n "$kexpr" ]]; then
              pytest -ssv "$nodeid" -k "$kexpr" --sys-desc "$SYSTEM_DESC_PATH" --junit-xml "$report"
            else
              pytest -ssv "$nodeid" --sys-desc "$SYSTEM_DESC_PATH" --junit-xml "$report"
            fi
          }

          if [[ "$ARCH_NAME" == "wormhole_b0" ]]; then
            # Wormhole list: broadest simulator smoke coverage.
            run_sim_test "test/python/golden/ttir_ops/eltwise/test_ttir_unary.py::test_unary_ops" "ttmetal" "test_reports/ttsim_unary_wh.xml"
            run_sim_test "test/python/golden/ttir_ops/eltwise/test_ttir_binary.py::test_binary_ops" "ttmetal" "test_reports/ttsim_binary_wh.xml"
            run_sim_test "test/python/golden/test_metal_matmul.py::test_matmul_ttnn_shapes_double_buffered" "" "test_reports/ttsim_matmul_wh.xml"
          elif [[ "$ARCH_NAME" == "blackhole" ]]; then
            # Blackhole list: start smaller and expand as BH simulator support improves.
            run_sim_test "test/python/golden/ttir_ops/eltwise/test_ttir_unary.py::test_unary_ops" "ttmetal" "test_reports/ttsim_unary_bh.xml"
          else
            echo "Unsupported ARCH_NAME: $ARCH_NAME"
            exit 1
          fi

      - name: Upload TTSim test report xml
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-ttsim-${{ matrix.arch }}
          path: test_reports
          if-no-files-found: ignore

      - name: Show TTSim test report
        continue-on-error: true
        if: success() || failure()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: test_reports/ttsim_*.xml
          check_name: TTSim golden tests (${{ matrix.arch }})
          job_summary: false
